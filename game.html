<!DOCTYPE html>
<html>
<head>
    <title>Rock Paper Scissors Game</title>

    <style>
        body{
            font-family: Arial;
            text-align: center;
            background: #1e1e1e;
            color: white;
            margin-top: 50px;
        }

        h1{
            margin-bottom: 10px;
        }

        .btn{
            padding: 15px 25px;
            margin: 10px;
            font-size: 18px;
            cursor: pointer;
            border: none;
            border-radius: 10px;
        }

        .rock{ background: #ff4d4d; }
        .paper{ background: #4da6ff; }
        .scissors{ background: #4dff88; }

        #result{
            margin-top: 20px;
            font-size: 22px;
            font-weight: bold;
        }

        #score{
            margin-top: 10px;
            font-size: 18px;
        }

        #restart{
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 16px;
            background: #333;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<h1>Rock Paper Scissors</h1>
<h3>First to 30 Wins 🏆</h3>

<button class="btn rock" onclick="play('rock')">Rock 🪨</button>
<button class="btn paper" onclick="play('paper')">Paper 📄</button>
<button class="btn scissors" onclick="play('scissors')">Scissors ✂️</button>

<br>

<button id="restart" onclick="restartGame()">Restart Game 🔄</button>

<div id="result"></div>
<div id="score"></div>

<script>

// ---------------- VARIABLES ----------------
let userScore = 0;
let computerScore = 0;

let choices = ["rock", "paper", "scissors"];

// ---------------- PLAY FUNCTION ----------------
function play(userChoice){

    let computerChoice = choices[Math.floor(Math.random() * 3)];

    let resultText = "";

    // DRAW
    if(userChoice === computerChoice){
        resultText = "Draw 🤝";
    }

    // USER WIN
    else if(
        (userChoice === "rock" && computerChoice === "scissors") ||
        (userChoice === "paper" && computerChoice === "rock") ||
        (userChoice === "scissors" && computerChoice === "paper")
    ){
        resultText = "You Win 🎉";
        userScore++;
    }

    // COMPUTER WIN
    else{
        resultText = "Computer Wins 💻";
        computerScore++;
    }

    // SHOW RESULT
    document.getElementById("result").innerHTML =
    `You: ${userChoice} | Computer: ${computerChoice} <br><br> ${resultText}`;

    updateScore();
    checkWinner();
}

// ---------------- UPDATE SCORE ----------------
function updateScore(){
    document.getElementById("score").innerHTML =
    `Your Score: ${userScore} | Computer Score: ${computerScore}`;
}

// ---------------- CHECK WINNER ----------------
function checkWinner(){

    if(userScore >= 30){
        alert("🎉 Congratulations! You reached 30 points and WON the game!");
        restartGame();
    }

    else if(computerScore >= 30){
        alert("💻 Computer reached 30 points first! You LOST the game!");
        restartGame();
    }
}

// ---------------- RESTART GAME ----------------
function restartGame(){

    userScore = 0;
    computerScore = 0;

    document.getElementById("result").innerHTML = "";
    updateScore();
}

// initial score show
updateScore();

</script>

</body>
</html>
