<!DOCTYPE html>
<html>
<head>
    <title>Tic Tac Toe</title>

    <style>

        body{
            background:#1e1e1e;
            color:white;
            font-family:Arial;
            text-align:center;
        }

        h1{
            margin-top:20px;
        }

        #board{
            width:330px;
            margin:auto;
            display:grid;
            grid-template-columns:repeat(3,100px);
            gap:10px;
            margin-top:30px;
        }

        .cell{
            width:100px;
            height:100px;
            font-size:40px;
            font-weight:bold;
            cursor:pointer;
            background:white;
            border:none;
            border-radius:10px;
        }

        #status{
            margin-top:20px;
            font-size:25px;
            font-weight:bold;
        }

        #restart{
            margin-top:25px;
            padding:10px 20px;
            font-size:18px;
            cursor:pointer;
            border:none;
            border-radius:10px;
            background:#333;
            color:white;
        }

    </style>
</head>

<body>

    <h1>Tic Tac Toe</h1>

    <div id="status">Player X Turn</div>

    <div id="board">

        <button class="cell"></button>
        <button class="cell"></button>
        <button class="cell"></button>

        <button class="cell"></button>
        <button class="cell"></button>
        <button class="cell"></button>

        <button class="cell"></button>
        <button class="cell"></button>
        <button class="cell"></button>

    </div>

    <button id="restart">Restart Game</button>

<script>

let currentPlayer = "X";

let board = ["","","","","","","","",""];

const cells = document.querySelectorAll(".cell");

const statusText = document.getElementById("status");

const winningConditions = [

    [0,1,2],
    [3,4,5],
    [6,7,8],

    [0,3,6],
    [1,4,7],
    [2,5,8],

    [0,4,8],
    [2,4,6]

];

cells.forEach((cell,index)=>{

    cell.addEventListener("click",()=>{

        if(board[index] == ""){

            board[index] = currentPlayer;

            cell.innerText = currentPlayer;

            checkWinner();

        }

    });

});

function checkWinner(){

    let winner = false;

    winningConditions.forEach(condition=>{

        let a = condition[0];
        let b = condition[1];
        let c = condition[2];

        if(
            board[a] &&
            board[a] == board[b] &&
            board[a] == board[c]
        ){

            winner = true;

            statusText.innerText =
            `Player ${board[a]} Wins!`;

            alert(`Player ${board[a]} Wins!`);

            cells.forEach(cell=>{
                cell.disabled = true;
            });

        }

    });

    if(!winner){

        if(!board.includes("")){

            statusText.innerText = "Game Draw!";

            alert("Game Draw!");

        }
        else{

            currentPlayer =
            currentPlayer == "X" ? "O" : "X";

            statusText.innerText =
            `Player ${currentPlayer} Turn`;

        }

    }

}

document.getElementById("restart")
.addEventListener("click",()=>{

    board = ["","","","","","","","",""];

    currentPlayer = "X";

    statusText.innerText = "Player X Turn";

    cells.forEach(cell=>{

        cell.innerText = "";

        cell.disabled = false;

    });

});

</script>

</body>
</html>
